on:
  push:
    branches:
    - main
    - try-e66683c158
  pull_request:

jobs:
  install_fdb:
    name: Install

    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v1

      - name: Install FoundationDB
        uses: ./

      - name: foundationdb status
        run: fdbcli --exec status
